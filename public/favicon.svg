<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#d4ab84"/>

  <!-- Church icon (scaled/translated to fit circle) -->
  <g fill="#1b3a6b" transform="translate(8, 4) scale(0.75)">
    <!-- Cross at top -->
    <rect x="29.5" y="2" width="5" height="13" rx="1.5"/>
    <rect x="23" y="5.5" width="18" height="4.5" rx="1.5"/>
    <!-- Steeple tower -->
    <rect x="26" y="13" width="12" height="13" rx="1"/>
    <!-- Bell arch opening -->
    <path d="M29 18 L29 23 Q29 27 32 27 Q35 27 35 23 L35 18 Z" opacity="0.35"/>
    <!-- Peaked roof -->
    <path d="M6 37 L32 22 L58 37 Z"/>
    <!-- Main body -->
    <rect x="8" y="37" width="48" height="24" rx="1"/>
    <!-- Left arched window -->
    <path d="M12 41 L12 52 Q12 58 19 58 Q26 58 26 52 L26 41 Z" opacity="0.3"/>
    <rect x="18" y="41" width="1.5" height="17" opacity="0.6"/>
    <rect x="12" y="47.5" width="14" height="1.5" opacity="0.6"/>
    <!-- Right arched window -->
    <path d="M38 41 L38 52 Q38 58 45 58 Q52 58 52 52 L52 41 Z" opacity="0.3"/>
    <rect x="44.5" y="41" width="1.5" height="17" opacity="0.6"/>
    <rect x="38" y="47.5" width="14" height="1.5" opacity="0.6"/>
    <!-- Center arched door -->
    <path d="M27 61 L27 51 Q27 44 32 44 Q37 44 37 51 L37 61 Z" opacity="0.4"/>
    <!-- Steps -->
    <rect x="22" y="59" width="20" height="3" rx="0.5"/>
    <rect x="16" y="62" width="32" height="4" rx="0.5"/>
  </g>
</svg>
